[build]
builder = "NIXPACKS"
buildCommand = "yarn install && npx nx build twenty-shared && npx nx build twenty-front && npx nx build twenty-server"

[deploy]
preDeployCommand = "node packages/twenty-server/dist/database/scripts/setup-db.js && node packages/twenty-server/dist/command/command run-instance-commands"
startCommand = "node packages/twenty-server/dist/main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.healthcheck]
path = "/healthz"
timeout = 300
